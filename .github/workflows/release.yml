name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR · publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # `secrets.*` cannot be referenced directly inside step-level `if:`.
    # Capture the presence at job level into an env var, then gate on it.
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack & install
        run: |
          corepack enable
          yarn install --immutable

      - name: Build all publishable packages
        run: yarn build

      - name: Create Release PR or publish
        if: env.HAS_NPM_TOKEN == 'yes'
        uses: changesets/action@v1
        with:
          version: yarn changeset:version
          publish: yarn changeset publish
          createGithubReleases: true
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Note · NPM_TOKEN not configured
        if: env.HAS_NPM_TOKEN != 'yes'
        run: |
          echo "NPM_TOKEN is not set as a repository secret."
          echo "Skipping changesets release. Build above already validated everything."
